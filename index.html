<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>収入記録</title>
<meta name="theme-color" content="#2b6cb0">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="収入記録">
<style>
  :root {
    --bg: #f5f7fa;
    --card: #ffffff;
    --text: #1a202c;
    --muted: #718096;
    --border: #e2e8f0;
    --accent: #2b6cb0;
    --accent-light: #ebf4ff;
    --green: #2f855a;
    --green-light: #f0fff4;
    --danger: #c53030;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }
  .container {
    max-width: 640px;
    margin: 0 auto;
    padding: 24px 16px 48px;
  }
  h1 {
    font-size: 22px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .card h2 {
    font-size: 14px;
    color: var(--muted);
    font-weight: 600;
    margin-bottom: 12px;
  }
  .hidden { display: none !important; }

  /* サマリー */
  .summary {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 16px;
  }
  .summary .item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
  }
  .summary .label { font-size: 12px; color: var(--muted); }
  .summary .value { font-size: 18px; font-weight: 700; margin-top: 2px; }
  .summary .item.main { background: var(--green-light); border-color: #c6f6d5; }
  .summary .item.main .value { color: var(--green); }

  /* サイト別 */
  .month-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .month-nav .title { font-weight: 700; font-size: 15px; }
  .month-nav button {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px 12px;
    cursor: pointer;
    font-family: inherit;
    font-size: 14px;
    color: var(--text);
  }
  .month-nav button:hover:not(:disabled) { background: var(--accent-light); }
  .month-nav button:disabled { opacity: 0.35; cursor: default; }
  .client-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 0;
  }
  .client-row .name {
    width: 7em;
    flex-shrink: 0;
    font-size: 14px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .client-row .bar-track {
    flex: 1;
    height: 16px;
    background: #edf2f7;
    border-radius: 4px;
    overflow: hidden;
  }
  .client-row .bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 4px;
    min-width: 0;
    transition: width 0.3s;
  }
  .client-row .amt {
    width: 7.5em;
    text-align: right;
    font-weight: 700;
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
    font-size: 15px;
  }
  .client-row.zero .name { color: var(--muted); }
  .client-row.zero .amt {
    color: var(--muted);
    font-weight: 400;
    font-size: 12px;
  }
  .client-total {
    display: flex;
    justify-content: space-between;
    border-top: 1px solid var(--border);
    margin-top: 8px;
    padding-top: 10px;
    font-size: 14px;
  }
  .client-total .amt { font-weight: 700; }

  /* フォーム */
  form .row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }
  label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 4px;
  }
  input, select {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 16px;
    font-family: inherit;
    background: #fff;
  }
  input:focus, select:focus {
    outline: 2px solid var(--accent);
    outline-offset: -1px;
    border-color: var(--accent);
  }
  #new-client-wrap { margin-top: 8px; }
  button.add {
    width: 100%;
    padding: 12px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
  }
  button.add:hover { background: #2c5282; }

  /* サイトの管理 */
  details.manage { margin-top: 14px; }
  details.manage summary {
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    user-select: none;
  }
  .manage-add {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }
  .manage-add input { flex: 1; font-size: 14px; padding: 8px 10px; }
  .manage-add button {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0 14px;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    color: var(--accent);
    font-weight: 600;
    white-space: nowrap;
  }
  .manage-add button:hover { background: var(--accent-light); }
  .chip-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
  }
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 2px;
    background: var(--accent-light);
    color: var(--accent);
    border-radius: 999px;
    padding: 3px 6px 3px 12px;
    font-size: 13px;
  }
  .chip button {
    background: none;
    border: none;
    cursor: pointer;
    color: inherit;
    font-size: 12px;
    padding: 2px 5px;
    border-radius: 999px;
    line-height: 1;
  }
  .chip button:hover { color: var(--danger); }
  .manage-note { font-size: 11px; color: var(--muted); margin-top: 8px; }

  /* グラフ */
  .chart {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    height: 140px;
  }
  .chart .col {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    align-items: center;
    height: 100%;
    gap: 4px;
  }
  .chart .bar-amount { font-size: 10px; color: var(--muted); white-space: nowrap; }
  .chart .bar {
    width: 100%;
    max-width: 48px;
    background: var(--accent);
    border-radius: 4px 4px 0 0;
    min-height: 2px;
    transition: height 0.3s;
  }
  .chart .col.current .bar { background: var(--green); }
  .chart .month-label { font-size: 11px; color: var(--muted); }

  /* 履歴 */
  .month-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 12px 4px 6px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    color: var(--muted);
    font-weight: 600;
  }
  .record {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 4px;
    border-bottom: 1px solid var(--border);
  }
  .record:last-child { border-bottom: none; }
  .record .date { font-size: 12px; color: var(--muted); width: 3.5em; flex-shrink: 0; }
  .record .badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 999px;
    background: var(--accent-light);
    color: var(--accent);
    flex-shrink: 0;
    max-width: 10em;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .record .memo {
    font-size: 13px;
    color: var(--muted);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .record .amount { font-weight: 700; white-space: nowrap; }
  .record .delete {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    padding: 4px 6px;
    border-radius: 6px;
    line-height: 1;
  }
  .record .delete:hover { color: var(--danger); background: #fff5f5; }
  .card-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .card-head h2 { margin-bottom: 0; }
  .csv-btn {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px 12px;
    font-size: 12px;
    color: var(--accent);
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }
  .csv-btn:hover { background: var(--accent-light); }
  .empty {
    text-align: center;
    color: var(--muted);
    padding: 24px 0;
    font-size: 14px;
  }

  @media (max-width: 480px) {
    .summary { grid-template-columns: 1fr 1fr; }
    .summary .item.main { grid-column: 1 / -1; }
    .record { flex-wrap: wrap; }
    .record .amount { margin-left: auto; }
    .record .memo {
      flex: none;
      flex-basis: 100%;
      order: 5;
      margin: 1px 0 0 calc(3.5em + 10px);
      font-size: 12px;
    }
    .record .memo:empty { display: none; }
    .client-row .name { width: 6em; }
    .client-row .amt { width: 6.5em; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>💰 収入記録</h1>

  <div class="summary">
    <div class="item main">
      <div class="label">今月の収入</div>
      <div class="value" id="sum-this-month">¥0</div>
    </div>
    <div class="item">
      <div class="label">先月の収入</div>
      <div class="value" id="sum-last-month">¥0</div>
    </div>
    <div class="item">
      <div class="label">今年の累計</div>
      <div class="value" id="sum-year">¥0</div>
    </div>
  </div>

  <div class="card">
    <h2>サイト別の収入</h2>
    <div class="month-nav">
      <button type="button" id="prev-month">◀ 前月</button>
      <span class="title" id="view-month-label"></span>
      <button type="button" id="next-month">翌月 ▶</button>
    </div>
    <div id="client-breakdown"></div>
  </div>

  <div class="card">
    <h2>収入を追加</h2>
    <form id="form">
      <div class="row">
        <div>
          <label for="amount">金額(円)</label>
          <input type="number" id="amount" min="1" step="1" placeholder="50000" required>
        </div>
        <div>
          <label for="date">日付</label>
          <input type="date" id="date" required>
        </div>
      </div>
      <div class="row">
        <div>
          <label for="client">サイト</label>
          <select id="client"></select>
          <div id="new-client-wrap" class="hidden">
            <input type="text" id="new-client" placeholder="新しいサイト名">
          </div>
        </div>
        <div>
          <label for="memo">顧客名</label>
          <input type="text" id="memo" placeholder="例: 山田太郎">
        </div>
      </div>
      <button type="submit" class="add">追加する</button>
    </form>
    <details class="manage">
      <summary>サイトの管理</summary>
      <div class="manage-add">
        <input type="text" id="manage-input" placeholder="サイト名(例: BASE)">
        <button type="button" id="manage-add-btn">登録</button>
      </div>
      <div class="chip-list" id="chip-list"></div>
      <div class="manage-note">※ サイトを削除しても、記録済みの収入は消えません。</div>
    </details>
  </div>

  <div class="card">
    <h2>月別の収入(直近6ヶ月)</h2>
    <div class="chart" id="chart"></div>
  </div>

  <div class="card">
    <div class="card-head">
      <h2>履歴</h2>
      <button type="button" id="export-csv" class="csv-btn">CSV書き出し</button>
    </div>
    <div id="list"></div>
  </div>
</div>

<script>
const STORAGE_KEY = 'income-records';
const CLIENTS_KEY = 'income-clients';

function loadJson(key) {
  try {
    return JSON.parse(localStorage.getItem(key)) || [];
  } catch {
    return [];
  }
}
function saveRecords() { localStorage.setItem(STORAGE_KEY, JSON.stringify(records)); }
function saveClients() { localStorage.setItem(CLIENTS_KEY, JSON.stringify(clients)); }

// 旧バージョンのデータ(category)はclientに引き継ぐ
let records = loadJson(STORAGE_KEY).map(r => r.client ? r : { ...r, client: r.category || 'その他' });
let clients = loadJson(CLIENTS_KEY);

const yen = new Intl.NumberFormat('ja-JP', { style: 'currency', currency: 'JPY' });

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}
function monthKey(dateStr) {
  return dateStr.slice(0, 7); // 'YYYY-MM'
}
function shiftMonth(key, diff) {
  const [y, m] = key.split('-').map(Number);
  const d = new Date(y, m - 1 + diff, 1);
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
}
function monthLabel(key) {
  return `${Number(key.slice(0, 4))}年${Number(key.slice(5))}月`;
}
function monthTotal(key) {
  return records
    .filter(r => monthKey(r.date) === key)
    .reduce((sum, r) => sum + r.amount, 0);
}

let viewMonth = monthKey(todayStr());

function renderSummary() {
  const thisMonth = monthKey(todayStr());
  const lastMonth = shiftMonth(thisMonth, -1);
  const thisYear = thisMonth.slice(0, 4);
  const yearTotal = records
    .filter(r => r.date.startsWith(thisYear))
    .reduce((sum, r) => sum + r.amount, 0);

  document.getElementById('sum-this-month').textContent = yen.format(monthTotal(thisMonth));
  document.getElementById('sum-last-month').textContent = yen.format(monthTotal(lastMonth));
  document.getElementById('sum-year').textContent = yen.format(yearTotal);
}

function renderClientBreakdown() {
  const container = document.getElementById('client-breakdown');
  container.innerHTML = '';
  document.getElementById('view-month-label').textContent = monthLabel(viewMonth);
  document.getElementById('next-month').disabled = viewMonth >= monthKey(todayStr());

  // 登録済みサイト + その月に記録のあるサイト(登録外も含む)
  const totals = new Map();
  for (const c of clients) totals.set(c, 0);
  for (const r of records) {
    if (monthKey(r.date) === viewMonth) {
      totals.set(r.client, (totals.get(r.client) || 0) + r.amount);
    }
  }

  if (totals.size === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty';
    empty.textContent = '「サイトの管理」から毎月のサイトを登録すると、ここに内訳が表示されます。';
    container.appendChild(empty);
    return;
  }

  const entries = [...totals.entries()];
  const paid = entries.filter(([, v]) => v > 0).sort((a, b) => b[1] - a[1]);
  const unpaid = entries.filter(([, v]) => v === 0);
  const max = Math.max(...entries.map(([, v]) => v), 1);

  for (const [name, total] of [...paid, ...unpaid]) {
    const row = document.createElement('div');
    row.className = 'client-row' + (total === 0 ? ' zero' : '');

    const nameEl = document.createElement('span');
    nameEl.className = 'name';
    nameEl.textContent = name;
    nameEl.title = name;

    const track = document.createElement('div');
    track.className = 'bar-track';
    const fill = document.createElement('div');
    fill.className = 'bar-fill';
    fill.style.width = `${(total / max) * 100}%`;
    track.appendChild(fill);

    const amt = document.createElement('span');
    amt.className = 'amt';
    amt.textContent = total > 0 ? yen.format(total) : '売上なし';

    row.append(nameEl, track, amt);
    container.appendChild(row);
  }

  const totalRow = document.createElement('div');
  totalRow.className = 'client-total';
  const label = document.createElement('span');
  label.textContent = '合計';
  const amt = document.createElement('span');
  amt.className = 'amt';
  amt.textContent = yen.format(monthTotal(viewMonth));
  totalRow.append(label, amt);
  container.appendChild(totalRow);
}

function renderClientOptions(selected) {
  const sel = document.getElementById('client');
  sel.innerHTML = '';
  for (const c of clients) sel.append(new Option(c, c));
  sel.append(new Option('＋ 新しいサイトを追加', '__add__'));
  if (selected && (clients.includes(selected) || selected === '__add__')) {
    sel.value = selected;
  } else if (clients.length === 0) {
    sel.value = '__add__';
  }
  toggleNewClientInput();
}
function toggleNewClientInput() {
  const isAdd = document.getElementById('client').value === '__add__';
  document.getElementById('new-client-wrap').classList.toggle('hidden', !isAdd);
}

function renderChips() {
  const list = document.getElementById('chip-list');
  list.innerHTML = '';
  for (const c of clients) {
    const chip = document.createElement('span');
    chip.className = 'chip';
    const name = document.createElement('span');
    name.textContent = c;
    const del = document.createElement('button');
    del.type = 'button';
    del.textContent = '✕';
    del.title = `${c} を削除`;
    del.addEventListener('click', () => {
      clients = clients.filter(x => x !== c);
      saveClients();
      renderClientOptions();
      renderChips();
      renderClientBreakdown();
    });
    chip.append(name, del);
    list.appendChild(chip);
  }
}

function addClient(name) {
  name = name.trim();
  if (!name || clients.includes(name)) return name;
  clients.push(name);
  saveClients();
  renderClientOptions(name);
  renderChips();
  renderClientBreakdown();
  return name;
}

function renderChart() {
  const chart = document.getElementById('chart');
  chart.innerHTML = '';
  const thisMonth = monthKey(todayStr());
  const keys = [];
  for (let i = 5; i >= 0; i--) keys.push(shiftMonth(thisMonth, -i));
  const totals = keys.map(monthTotal);
  const max = Math.max(...totals, 1);

  keys.forEach((key, i) => {
    const col = document.createElement('div');
    col.className = 'col' + (key === thisMonth ? ' current' : '');

    const amount = document.createElement('div');
    amount.className = 'bar-amount';
    amount.textContent = totals[i] > 0 ? totals[i].toLocaleString('ja-JP') : '';

    const bar = document.createElement('div');
    bar.className = 'bar';
    bar.style.height = `${(totals[i] / max) * 100}%`;

    const label = document.createElement('div');
    label.className = 'month-label';
    label.textContent = `${Number(key.slice(5))}月`;

    col.append(amount, bar, label);
    chart.appendChild(col);
  });
}

function renderList() {
  const list = document.getElementById('list');
  list.innerHTML = '';

  if (records.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty';
    empty.textContent = 'まだ記録がありません。上のフォームから追加してください。';
    list.appendChild(empty);
    return;
  }

  const sorted = [...records].sort((a, b) =>
    a.date === b.date ? b.createdAt - a.createdAt : (a.date < b.date ? 1 : -1)
  );

  let currentMonth = null;
  for (const r of sorted) {
    const key = monthKey(r.date);
    if (key !== currentMonth) {
      currentMonth = key;
      const header = document.createElement('div');
      header.className = 'month-header';
      const title = document.createElement('span');
      title.textContent = monthLabel(key);
      const total = document.createElement('span');
      total.textContent = yen.format(monthTotal(key));
      header.append(title, total);
      list.appendChild(header);
    }

    const row = document.createElement('div');
    row.className = 'record';

    const date = document.createElement('span');
    date.className = 'date';
    date.textContent = `${Number(r.date.slice(5, 7))}/${Number(r.date.slice(8, 10))}`;

    const badge = document.createElement('span');
    badge.className = 'badge';
    badge.textContent = r.client;
    badge.title = r.client;

    const memo = document.createElement('span');
    memo.className = 'memo';
    memo.textContent = r.memo ? '👤 ' + r.memo : '';

    const amount = document.createElement('span');
    amount.className = 'amount';
    amount.textContent = yen.format(r.amount);

    const del = document.createElement('button');
    del.className = 'delete';
    del.textContent = '✕';
    del.title = '削除';
    del.addEventListener('click', () => {
      if (confirm(`${r.client} の ${yen.format(r.amount)}(${r.date})を削除しますか?`)) {
        records = records.filter(x => x.id !== r.id);
        saveRecords();
        render();
      }
    });

    row.append(date, badge, memo, amount, del);
    list.appendChild(row);
  }
}

function render() {
  renderSummary();
  renderClientBreakdown();
  renderChart();
  renderList();
}

document.getElementById('client').addEventListener('change', toggleNewClientInput);

document.getElementById('prev-month').addEventListener('click', () => {
  viewMonth = shiftMonth(viewMonth, -1);
  renderClientBreakdown();
});
document.getElementById('next-month').addEventListener('click', () => {
  viewMonth = shiftMonth(viewMonth, 1);
  renderClientBreakdown();
});

document.getElementById('manage-add-btn').addEventListener('click', () => {
  const input = document.getElementById('manage-input');
  addClient(input.value);
  input.value = '';
  input.focus();
});
document.getElementById('manage-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    document.getElementById('manage-add-btn').click();
  }
});

document.getElementById('form').addEventListener('submit', (e) => {
  e.preventDefault();
  const amount = Number(document.getElementById('amount').value);
  const date = document.getElementById('date').value;
  if (!amount || amount <= 0 || !date) return;

  let client = document.getElementById('client').value;
  if (client === '__add__') {
    const newClientInput = document.getElementById('new-client');
    client = newClientInput.value.trim();
    if (!client) {
      newClientInput.focus();
      return;
    }
    addClient(client);
    newClientInput.value = '';
  }

  records.push({
    id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
    date,
    amount,
    client,
    memo: document.getElementById('memo').value.trim(),
    createdAt: Date.now(),
  });
  saveRecords();

  document.getElementById('amount').value = '';
  document.getElementById('memo').value = '';
  renderClientOptions(client);
  document.getElementById('amount').focus();
  render();
});

function csvField(v) {
  v = String(v ?? '');
  return /[",\n]/.test(v) ? '"' + v.replace(/"/g, '""') + '"' : v;
}
function buildCsv() {
  const sorted = [...records].sort((a, b) => (a.date < b.date ? -1 : 1));
  const lines = ['日付,サイト,金額,顧客名'];
  for (const r of sorted) {
    lines.push([r.date, csvField(r.client), r.amount, csvField(r.memo)].join(','));
  }
  // 先頭のBOMはExcelで文字化けさせないため
  return '\ufeff' + lines.join('\r\n');
}
document.getElementById('export-csv').addEventListener('click', () => {
  const blob = new Blob([buildCsv()], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `収入記録_${todayStr()}.csv`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
});

document.getElementById('date').value = todayStr();
renderClientOptions();
renderChips();
render();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
