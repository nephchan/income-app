<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>収入・オーダー管理</title>
<meta name="theme-color" content="#2b6cb0">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="収入記録">
<style>
  :root {
    --bg: #f5f7fa;
    --card: #ffffff;
    --text: #1a202c;
    --muted: #718096;
    --border: #e2e8f0;
    --accent: #2b6cb0;
    --accent-light: #ebf4ff;
    --green: #2f855a;
    --green-light: #f0fff4;
    --danger: #c53030;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }
  .container {
    max-width: 640px;
    margin: 0 auto;
    padding: 24px 16px 48px;
  }
  h1 {
    font-size: 22px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .card h2 {
    font-size: 14px;
    color: var(--muted);
    font-weight: 600;
    margin-bottom: 12px;
  }
  .hidden { display: none !important; }

  /* タブ(収入 / オーダー) */
  .tabs {
    display: flex;
    gap: 8px;
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--bg);
    padding: 12px 0;
    margin-bottom: 8px;
  }
  .tabs button {
    flex: 1;
    padding: 11px;
    border: 1px solid var(--border);
    background: #fff;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    font-family: inherit;
    color: var(--muted);
    cursor: pointer;
  }
  .tabs button.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .tabs button[data-tab="orders"].active { background: #d6457f; border-color: #d6457f; }
  #tab-orders { margin: 0 -16px; }
  #orders-frame { width: 100%; border: 0; display: block; }

  /* サマリー */
  .summary {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 16px;
  }
  .summary .item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
  }
  .summary .label { font-size: 12px; color: var(--muted); }
  .summary .value { font-size: 18px; font-weight: 700; margin-top: 2px; }
  .summary .item.main { background: var(--green-light); border-color: #c6f6d5; }
  .summary .item.main .value { color: var(--green); }

  /* サイト別 */
  .month-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .month-nav .title { font-weight: 700; font-size: 15px; }
  .month-nav button {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px 12px;
    cursor: pointer;
    font-family: inherit;
    font-size: 14px;
    color: var(--text);
  }
  .month-nav button:hover:not(:disabled) { background: var(--accent-light); }
  .month-nav button:disabled { opacity: 0.35; cursor: default; }
  .client-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 0;
  }
  .client-row .name {
    width: 7em;
    flex-shrink: 0;
    font-size: 14px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .client-row .bar-track {
    flex: 1;
    height: 16px;
    background: #edf2f7;
    border-radius: 4px;
    overflow: hidden;
  }
  .client-row .bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 4px;
    min-width: 0;
    transition: width 0.3s;
  }
  .client-row .amt {
    width: 7.5em;
    text-align: right;
    font-weight: 700;
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
    font-size: 15px;
  }
  .client-row.zero .name { color: var(--muted); }
  .client-row.zero .amt {
    color: var(--muted);
    font-weight: 400;
    font-size: 12px;
  }
  .client-total {
    display: flex;
    justify-content: space-between;
    border-top: 1px solid var(--border);
    margin-top: 8px;
    padding-top: 10px;
    font-size: 14px;
  }
  .client-total .amt { font-weight: 700; }

  /* フォーム */
  form .row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }
  label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 4px;
  }
  input, select {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 16px;
    font-family: inherit;
    background: #fff;
  }
  input:focus, select:focus {
    outline: 2px solid var(--accent);
    outline-offset: -1px;
    border-color: var(--accent);
  }
  #new-client-wrap { margin-top: 8px; }
  button.add {
    width: 100%;
    padding: 12px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
  }
  button.add:hover { background: #2c5282; }

  /* サイトの管理 */
  details.manage { margin-top: 14px; }
  details.manage summary {
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    user-select: none;
  }
  .manage-add {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }
  .manage-add input { flex: 1; font-size: 14px; padding: 8px 10px; }
  .manage-add button {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0 14px;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    color: var(--accent);
    font-weight: 600;
    white-space: nowrap;
  }
  .manage-add button:hover { background: var(--accent-light); }
  .chip-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
  }
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 2px;
    background: var(--accent-light);
    color: var(--accent);
    border-radius: 999px;
    padding: 3px 6px 3px 12px;
    font-size: 13px;
  }
  .chip button {
    background: none;
    border: none;
    cursor: pointer;
    color: inherit;
    font-size: 12px;
    padding: 2px 5px;
    border-radius: 999px;
    line-height: 1;
  }
  .chip button:hover { color: var(--danger); }
  .manage-note { font-size: 11px; color: var(--muted); margin-top: 8px; }

  /* グラフ */
  .chart {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    height: 140px;
  }
  .chart .col {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    align-items: center;
    height: 100%;
    gap: 4px;
  }
  .chart .bar-amount { font-size: 10px; color: var(--muted); white-space: nowrap; }
  .chart .bar {
    width: 100%;
    max-width: 48px;
    background: var(--accent);
    border-radius: 4px 4px 0 0;
    min-height: 2px;
    transition: height 0.3s;
  }
  .chart .col.current .bar { background: var(--green); }
  .chart .month-label { font-size: 11px; color: var(--muted); }

  /* 履歴 */
  .month-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 12px 4px 6px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    color: var(--muted);
    font-weight: 600;
  }
  .record {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 4px;
    border-bottom: 1px solid var(--border);
  }
  .record:last-child { border-bottom: none; }
  .record .date { font-size: 12px; color: var(--muted); width: 3.5em; flex-shrink: 0; }
  .record .badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 999px;
    background: var(--accent-light);
    color: var(--accent);
    flex-shrink: 0;
    max-width: 10em;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .record .memo {
    font-size: 13px;
    color: var(--muted);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .record .amount { font-weight: 700; white-space: nowrap; }
  .record .delete {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    padding: 4px 6px;
    border-radius: 6px;
    line-height: 1;
  }
  .record .delete:hover { color: var(--danger); background: #fff5f5; }
  .card-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 12px;
  }
  .card-head h2 { margin-bottom: 0; }
  .head-actions { display: flex; gap: 8px; }
  .import-preview {
    border: 1px solid var(--accent);
    background: var(--accent-light);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 14px;
  }
  .imp-title { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
  .imp-sub { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
  .imp-list {
    background: #fff;
    border-radius: 8px;
    padding: 6px 10px;
    max-height: 180px;
    overflow-y: auto;
  }
  .imp-row {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    font-size: 13px;
    padding: 3px 0;
  }
  .imp-row span:last-child { font-weight: 700; font-variant-numeric: tabular-nums; white-space: nowrap; }
  .imp-note { font-size: 12px; color: var(--muted); margin: 10px 0; }
  .imp-err { font-size: 13px; color: var(--danger); font-weight: 600; margin-bottom: 10px; }
  .imp-actions { display: flex; gap: 10px; justify-content: flex-end; align-items: center; }
  .csv-btn {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px 12px;
    font-size: 12px;
    color: var(--accent);
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }
  .csv-btn:hover { background: var(--accent-light); }
  .seg {
    display: inline-flex;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .seg button {
    background: #fff;
    border: none;
    padding: 4px 14px;
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    color: var(--muted);
  }
  .seg button + button { border-left: 1px solid var(--border); }
  .seg button.active {
    background: var(--accent);
    color: #fff;
    font-weight: 600;
  }
  .empty {
    text-align: center;
    color: var(--muted);
    padding: 24px 0;
    font-size: 14px;
  }

  @media (max-width: 480px) {
    .summary { grid-template-columns: 1fr 1fr; }
    .summary .item.main { grid-column: 1 / -1; }
    .record { flex-wrap: wrap; }
    .record .amount { margin-left: auto; }
    .record .memo {
      flex: none;
      flex-basis: 100%;
      order: 5;
      margin: 1px 0 0 calc(3.5em + 10px);
      font-size: 12px;
    }
    .record .memo:empty { display: none; }
    .client-row .name { width: 6em; }
    .client-row .amt { width: 6.5em; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="tabs">
    <button type="button" data-tab="income" class="active">💰 収入</button>
    <button type="button" data-tab="orders">💅 オーダー</button>
  </div>
  <div id="tab-income">
  <h1>💰 収入記録</h1>

  <div class="summary">
    <div class="item main">
      <div class="label">今月の収入</div>
      <div class="value" id="sum-this-month">¥0</div>
    </div>
    <div class="item">
      <div class="label">先月の収入</div>
      <div class="value" id="sum-last-month">¥0</div>
    </div>
    <div class="item">
      <div class="label">今年の累計</div>
      <div class="value" id="sum-year">¥0</div>
    </div>
  </div>

  <div class="card">
    <div class="card-head">
      <h2>サイト別の収入</h2>
      <div class="seg" id="breakdown-mode">
        <button type="button" data-mode="month" class="active">月ごと</button>
        <button type="button" data-mode="year">年ごと</button>
      </div>
    </div>
    <div class="month-nav">
      <button type="button" id="prev-month">◀ 前月</button>
      <span class="title" id="view-month-label"></span>
      <button type="button" id="next-month">翌月 ▶</button>
    </div>
    <div id="client-breakdown"></div>
  </div>

  <div class="card">
    <h2>収入を追加</h2>
    <form id="form">
      <div class="row">
        <div>
          <label for="amount">金額(円)</label>
          <input type="number" id="amount" min="1" step="1" placeholder="50000" required>
        </div>
        <div>
          <label for="date">日付</label>
          <input type="date" id="date" required>
        </div>
      </div>
      <div class="row">
        <div>
          <label for="client">サイト</label>
          <select id="client"></select>
          <div id="new-client-wrap" class="hidden">
            <input type="text" id="new-client" placeholder="新しいサイト名">
          </div>
        </div>
        <div>
          <label for="memo">顧客名</label>
          <input type="text" id="memo" placeholder="例: 山田太郎">
        </div>
      </div>
      <button type="submit" class="add">追加する</button>
    </form>
    <details class="manage">
      <summary>サイトの管理</summary>
      <div class="manage-add">
        <input type="text" id="manage-input" placeholder="サイト名(例: BASE)">
        <button type="button" id="manage-add-btn">登録</button>
      </div>
      <div class="chip-list" id="chip-list"></div>
      <div class="manage-note">※ サイトを削除しても、記録済みの収入は消えません。</div>
    </details>
  </div>

  <div class="card">
    <div class="card-head">
      <h2 id="chart-title">月別の収入(直近6ヶ月)</h2>
      <div class="seg" id="chart-mode">
        <button type="button" data-mode="month" class="active">月ごと</button>
        <button type="button" data-mode="year">年ごと</button>
      </div>
    </div>
    <div class="chart" id="chart"></div>
  </div>

  <div class="card">
    <div class="card-head">
      <h2>履歴 <span id="list-period"></span></h2>
      <div class="head-actions">
        <button type="button" id="import-csv" class="csv-btn">CSV取り込み</button>
        <button type="button" id="export-csv" class="csv-btn">CSV書き出し</button>
      </div>
    </div>
    <input type="file" id="import-file" accept=".csv,text/csv" hidden>
    <div id="import-preview" class="import-preview hidden"></div>
    <div id="list"></div>
  </div>
  </div><!-- /#tab-income -->

  <div id="tab-orders" class="hidden">
    <iframe id="orders-frame" title="ネイルオーダー管理" scrolling="no"></iframe>
  </div>
</div>

<script>
const STORAGE_KEY = 'income-records';
const CLIENTS_KEY = 'income-clients';

function loadJson(key) {
  try {
    return JSON.parse(localStorage.getItem(key)) || [];
  } catch {
    return [];
  }
}
function saveRecords() { localStorage.setItem(STORAGE_KEY, JSON.stringify(records)); }
function saveClients() { localStorage.setItem(CLIENTS_KEY, JSON.stringify(clients)); }

// 旧バージョンのデータ(category)はclientに引き継ぐ
let records = loadJson(STORAGE_KEY).map(r => r.client ? r : { ...r, client: r.category || 'その他' });
let clients = loadJson(CLIENTS_KEY);

const yen = new Intl.NumberFormat('ja-JP', { style: 'currency', currency: 'JPY' });

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}
function monthKey(dateStr) {
  return dateStr.slice(0, 7); // 'YYYY-MM'
}
function shiftMonth(key, diff) {
  const [y, m] = key.split('-').map(Number);
  const d = new Date(y, m - 1 + diff, 1);
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
}
function monthLabel(key) {
  return `${Number(key.slice(0, 4))}年${Number(key.slice(5))}月`;
}
function monthTotal(key) {
  return records
    .filter(r => monthKey(r.date) === key)
    .reduce((sum, r) => sum + r.amount, 0);
}

let viewMonth = monthKey(todayStr());
let viewYear = todayStr().slice(0, 4);
let breakdownMode = 'month'; // 'month' | 'year'
let chartMode = 'month';

function renderSummary() {
  const thisMonth = monthKey(todayStr());
  const lastMonth = shiftMonth(thisMonth, -1);
  const thisYear = thisMonth.slice(0, 4);
  const yearTotal = records
    .filter(r => r.date.startsWith(thisYear))
    .reduce((sum, r) => sum + r.amount, 0);

  document.getElementById('sum-this-month').textContent = yen.format(monthTotal(thisMonth));
  document.getElementById('sum-last-month').textContent = yen.format(monthTotal(lastMonth));
  document.getElementById('sum-year').textContent = yen.format(yearTotal);
}

function renderClientBreakdown() {
  const container = document.getElementById('client-breakdown');
  container.innerHTML = '';
  const isYear = breakdownMode === 'year';
  const thisMonth = monthKey(todayStr());
  document.getElementById('view-month-label').textContent =
    isYear ? `${Number(viewYear)}年` : monthLabel(viewMonth);
  document.getElementById('prev-month').textContent = isYear ? '◀ 前年' : '◀ 前月';
  document.getElementById('next-month').textContent = isYear ? '翌年 ▶' : '翌月 ▶';
  document.getElementById('next-month').disabled =
    isYear ? viewYear >= thisMonth.slice(0, 4) : viewMonth >= thisMonth;
  const inRange = isYear
    ? (d => d.startsWith(viewYear + '-'))
    : (d => monthKey(d) === viewMonth);

  // 登録済みサイト + 期間内に記録のあるサイト(登録外も含む)
  const totals = new Map();
  for (const c of clients) totals.set(c, 0);
  for (const r of records) {
    if (inRange(r.date)) {
      totals.set(r.client, (totals.get(r.client) || 0) + r.amount);
    }
  }

  if (totals.size === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty';
    empty.textContent = '「サイトの管理」から毎月のサイトを登録すると、ここに内訳が表示されます。';
    container.appendChild(empty);
    return;
  }

  const entries = [...totals.entries()];
  const paid = entries.filter(([, v]) => v > 0).sort((a, b) => b[1] - a[1]);
  const unpaid = entries.filter(([, v]) => v === 0);
  const max = Math.max(...entries.map(([, v]) => v), 1);

  for (const [name, total] of [...paid, ...unpaid]) {
    const row = document.createElement('div');
    row.className = 'client-row' + (total === 0 ? ' zero' : '');

    const nameEl = document.createElement('span');
    nameEl.className = 'name';
    nameEl.textContent = name;
    nameEl.title = name;

    const track = document.createElement('div');
    track.className = 'bar-track';
    const fill = document.createElement('div');
    fill.className = 'bar-fill';
    fill.style.width = `${(total / max) * 100}%`;
    track.appendChild(fill);

    const amt = document.createElement('span');
    amt.className = 'amt';
    amt.textContent = total > 0 ? yen.format(total) : '売上なし';

    row.append(nameEl, track, amt);
    container.appendChild(row);
  }

  const totalRow = document.createElement('div');
  totalRow.className = 'client-total';
  const label = document.createElement('span');
  label.textContent = '合計';
  const amt = document.createElement('span');
  amt.className = 'amt';
  amt.textContent = yen.format(entries.reduce((s, [, v]) => s + v, 0));
  totalRow.append(label, amt);
  container.appendChild(totalRow);
}

function renderClientOptions(selected) {
  const sel = document.getElementById('client');
  sel.innerHTML = '';
  for (const c of clients) sel.append(new Option(c, c));
  sel.append(new Option('＋ 新しいサイトを追加', '__add__'));
  if (selected && (clients.includes(selected) || selected === '__add__')) {
    sel.value = selected;
  } else if (clients.length === 0) {
    sel.value = '__add__';
  }
  toggleNewClientInput();
}
function toggleNewClientInput() {
  const isAdd = document.getElementById('client').value === '__add__';
  document.getElementById('new-client-wrap').classList.toggle('hidden', !isAdd);
}

function renderChips() {
  const list = document.getElementById('chip-list');
  list.innerHTML = '';
  for (const c of clients) {
    const chip = document.createElement('span');
    chip.className = 'chip';
    const name = document.createElement('span');
    name.textContent = c;
    const del = document.createElement('button');
    del.type = 'button';
    del.textContent = '✕';
    del.title = `${c} を削除`;
    del.addEventListener('click', () => {
      clients = clients.filter(x => x !== c);
      saveClients();
      renderClientOptions();
      renderChips();
      renderClientBreakdown();
    });
    chip.append(name, del);
    list.appendChild(chip);
  }
}

function addClient(name) {
  name = name.trim();
  if (!name || clients.includes(name)) return name;
  clients.push(name);
  saveClients();
  renderClientOptions(name);
  renderChips();
  renderClientBreakdown();
  return name;
}

function yearTotal(year) {
  return records
    .filter(r => r.date.startsWith(year + '-'))
    .reduce((sum, r) => sum + r.amount, 0);
}
function renderChart() {
  const chart = document.getElementById('chart');
  chart.innerHTML = '';
  const isYear = chartMode === 'year';
  document.getElementById('chart-title').textContent =
    isYear ? '年別の収入(直近6年)' : '月別の収入(直近6ヶ月)';
  const thisMonth = monthKey(todayStr());
  const thisYear = thisMonth.slice(0, 4);
  const current = isYear ? thisYear : thisMonth;
  const keys = [];
  for (let i = 5; i >= 0; i--) {
    keys.push(isYear ? String(Number(thisYear) - i) : shiftMonth(thisMonth, -i));
  }
  const totals = keys.map(k => (isYear ? yearTotal(k) : monthTotal(k)));
  const max = Math.max(...totals, 1);

  keys.forEach((key, i) => {
    const col = document.createElement('div');
    col.className = 'col' + (key === current ? ' current' : '');

    const amount = document.createElement('div');
    amount.className = 'bar-amount';
    // 年別で100万以上は「123万」表記(隣のラベルと重ならないように)
    amount.textContent = totals[i] > 0
      ? (isYear && totals[i] >= 1000000
          ? Math.round(totals[i] / 10000).toLocaleString('ja-JP') + '万'
          : totals[i].toLocaleString('ja-JP'))
      : '';

    const bar = document.createElement('div');
    bar.className = 'bar';
    bar.style.height = `${(totals[i] / max) * 100}%`;

    const label = document.createElement('div');
    label.className = 'month-label';
    label.textContent = isYear ? `${Number(key)}年` : `${Number(key.slice(5))}月`;

    col.append(amount, bar, label);
    chart.appendChild(col);
  });
}

function renderList() {
  const list = document.getElementById('list');
  list.innerHTML = '';

  // 「サイト別の収入」で選んでいる月/年と連動して絞り込む
  const isYear = breakdownMode === 'year';
  document.getElementById('list-period').textContent =
    isYear ? `(${Number(viewYear)}年)` : `(${monthLabel(viewMonth)})`;
  const inRange = isYear
    ? (d => d.startsWith(viewYear + '-'))
    : (d => monthKey(d) === viewMonth);
  const shown = records.filter(r => inRange(r.date));

  if (shown.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty';
    empty.textContent = records.length === 0
      ? 'まだ記録がありません。上のフォームから追加してください。'
      : 'この期間の記録はありません。「サイト別の収入」の ◀ ▶ や「月ごと/年ごと」で期間を切り替えられます。';
    list.appendChild(empty);
    return;
  }

  const sorted = [...shown].sort((a, b) =>
    a.date === b.date ? b.createdAt - a.createdAt : (a.date < b.date ? 1 : -1)
  );

  let currentMonth = null;
  for (const r of sorted) {
    const key = monthKey(r.date);
    if (key !== currentMonth) {
      currentMonth = key;
      const header = document.createElement('div');
      header.className = 'month-header';
      const title = document.createElement('span');
      title.textContent = monthLabel(key);
      const total = document.createElement('span');
      total.textContent = yen.format(monthTotal(key));
      header.append(title, total);
      list.appendChild(header);
    }

    const row = document.createElement('div');
    row.className = 'record';

    const date = document.createElement('span');
    date.className = 'date';
    date.textContent = `${Number(r.date.slice(5, 7))}/${Number(r.date.slice(8, 10))}`;

    const badge = document.createElement('span');
    badge.className = 'badge';
    badge.textContent = r.client;
    badge.title = r.client;

    const memo = document.createElement('span');
    memo.className = 'memo';
    memo.textContent = r.memo ? '👤 ' + r.memo : '';

    const amount = document.createElement('span');
    amount.className = 'amount';
    amount.textContent = yen.format(r.amount);

    const del = document.createElement('button');
    del.className = 'delete';
    del.textContent = '✕';
    del.title = '削除';
    del.addEventListener('click', () => {
      if (confirm(`${r.client} の ${yen.format(r.amount)}(${r.date})を削除しますか?`)) {
        records = records.filter(x => x.id !== r.id);
        saveRecords();
        render();
      }
    });

    row.append(date, badge, memo, amount, del);
    list.appendChild(row);
  }
}

function render() {
  renderSummary();
  renderClientBreakdown();
  renderChart();
  renderList();
}

function csvField(v) {
  v = String(v ?? '');
  return /[",\n]/.test(v) ? '"' + v.replace(/"/g, '""') + '"' : v;
}
function buildCsv() {
  const sorted = [...records].sort((a, b) => (a.date < b.date ? -1 : 1));
  const lines = ['日付,サイト,金額,顧客名'];
  for (const r of sorted) {
    lines.push([r.date, csvField(r.client), r.amount, csvField(r.memo)].join(','));
  }
  // 先頭のBOMはExcelで文字化けさせないため
  return '\ufeff' + lines.join('\r\n');
}
// ===== CSV取り込み(らくらく家計簿などの「収入」行を取り込む) =====
// 文字コードを自動判定(UTF-8でダメならShift_JIS)
function decodeBuffer(buf) {
  const bytes = new Uint8Array(buf);
  if (bytes[0] === 0xEF && bytes[1] === 0xBB && bytes[2] === 0xBF) {
    return new TextDecoder('utf-8').decode(bytes);
  }
  try {
    return new TextDecoder('utf-8', { fatal: true }).decode(bytes);
  } catch {
    try { return new TextDecoder('shift_jis').decode(bytes); }
    catch { return new TextDecoder('utf-8').decode(bytes); }
  }
}
// 引用符・カンマ・改行に対応したCSVパーサ
function parseCsv(text) {
  text = text.replace(/^\ufeff/, '');
  const rows = [];
  let row = [], field = '', q = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (q) {
      if (c === '"') { if (text[i + 1] === '"') { field += '"'; i++; } else q = false; }
      else field += c;
    } else if (c === '"') { q = true; }
    else if (c === ',') { row.push(field); field = ''; }
    else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
    else if (c !== '\r') { field += c; }
  }
  if (field !== '' || row.length) { row.push(field); rows.push(row); }
  return rows.filter(r => r.some(c => c.trim() !== ''));
}
function parseAmount(s) {
  return Number(String(s == null ? '' : s).replace(/[,，¥￥\s]/g, ''));
}
function normalizeDate(s) {
  const m = String(s).trim().match(/^(\d{4})[-/.](\d{1,2})[-/.](\d{1,2})/);
  return m ? `${m[1]}-${m[2].padStart(2, '0')}-${m[3].padStart(2, '0')}` : null;
}
function buildImport(text) {
  const rows = parseCsv(text);
  if (rows.length < 2) return { error: 'データが見つかりませんでした。' };
  const header = rows[0].map(h => h.trim());
  const find = names => header.findIndex(h => names.includes(h));
  const di = find(['日付', 'date']);
  const si = find(['費目', '項目', 'カテゴリ', 'サイト', '取引先']);
  const ci = find(['内容', 'メモ', '顧客名']);
  const ii = find(['収入', '入金', '金額']);
  const ei = find(['支出', '出金']);
  if (di < 0 || si < 0 || ii < 0) {
    return { error: '「日付」「費目」「収入」の列が見つかりませんでした。' };
  }
  const toAdd = [];
  let expenseCount = 0, skipped = 0;
  for (let r = 1; r < rows.length; r++) {
    const cols = rows[r];
    const income = parseAmount(cols[ii]);
    if (!(income > 0)) {
      if (ei >= 0 && parseAmount(cols[ei]) > 0) expenseCount++; else skipped++;
      continue;
    }
    const date = normalizeDate(cols[di]);
    const site = (cols[si] || '').trim();
    if (!date || !site) { skipped++; continue; }
    toAdd.push({ date, amount: Math.round(income), client: site, memo: ci >= 0 ? (cols[ci] || '').trim() : '' });
  }
  const existKey = new Set(records.map(r => `${r.date}|${r.client}|${r.amount}`));
  const fresh = [], dupes = [];
  for (const rec of toAdd) {
    (existKey.has(`${rec.date}|${rec.client}|${rec.amount}`) ? dupes : fresh).push(rec);
  }
  const perSite = new Map();
  for (const rec of fresh) perSite.set(rec.client, (perSite.get(rec.client) || 0) + rec.amount);
  const dates = fresh.map(r => r.date).sort();
  return {
    fresh, expenseCount, skipped, dupes,
    perSite: [...perSite.entries()].sort((a, b) => b[1] - a[1]),
    total: fresh.reduce((s, r) => s + r.amount, 0),
    from: dates[0], to: dates[dates.length - 1],
  };
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
}
let pendingImport = null;
function showImportPreview(result) {
  const panel = document.getElementById('import-preview');
  panel.classList.remove('hidden');
  panel.scrollIntoView({ block: 'center', behavior: 'smooth' });
  if (result.error) {
    panel.innerHTML = `<div class="imp-err">取り込めませんでした:${escapeHtml(result.error)}</div>` +
      `<div class="imp-actions"><button type="button" id="imp-cancel" class="csv-btn">閉じる</button></div>`;
    document.getElementById('imp-cancel').onclick = () => panel.classList.add('hidden');
    return;
  }
  pendingImport = result.fresh;
  const list = result.perSite.map(([name, amt]) =>
    `<div class="imp-row"><span>${escapeHtml(name)}</span><span>${yen.format(amt)}</span></div>`).join('') ||
    '<div class="imp-row"><span>取り込める収入がありません</span><span></span></div>';
  panel.innerHTML = `
    <div class="imp-title">取り込み内容の確認</div>
    <div class="imp-sub">${result.fresh.length}件 ・ ${result.from || '-'}〜${result.to || '-'} ・ 合計 ${yen.format(result.total)}</div>
    <div class="imp-list">${list}</div>
    <div class="imp-note">支出の行 ${result.expenseCount}件は取り込みません(収入のみ取り込みます)。${result.dupes.length ? `すでに登録済みの ${result.dupes.length}件はスキップします。` : ''}</div>
    <div class="imp-actions">
      <button type="button" id="imp-cancel" class="csv-btn">キャンセル</button>
      <button type="button" id="imp-confirm" class="add" style="width:auto;padding:9px 18px;">取り込む</button>
    </div>`;
  document.getElementById('imp-cancel').onclick = () => { panel.classList.add('hidden'); pendingImport = null; };
  document.getElementById('imp-confirm').onclick = doImport;
}
function doImport() {
  if (!pendingImport || !pendingImport.length) return;
  const newSites = [];
  for (const rec of pendingImport) {
    records.push({
      id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
      date: rec.date, amount: rec.amount, client: rec.client, memo: rec.memo, createdAt: Date.now(),
    });
    if (!clients.includes(rec.client) && !newSites.includes(rec.client)) newSites.push(rec.client);
  }
  clients.push(...newSites);
  saveRecords();
  saveClients();
  const n = pendingImport.length;
  pendingImport = null;
  document.getElementById('import-preview').classList.add('hidden');
  renderClientOptions();
  renderChips();
  render();
  alert(`${n}件を取り込みました。`);
}
document.getElementById('import-csv').addEventListener('click', () => {
  document.getElementById('import-file').click();
});
document.getElementById('import-file').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => showImportPreview(buildImport(decodeBuffer(reader.result)));
  reader.onerror = () => alert('ファイルの読み込みに失敗しました。');
  reader.readAsArrayBuffer(file);
  e.target.value = '';
});

document.getElementById('export-csv').addEventListener('click', () => {
  const blob = new Blob([buildCsv()], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `収入記録_${todayStr()}.csv`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
});

document.getElementById('date').value = todayStr();
renderClientOptions();
renderChips();
render();

// 同一オリジンの別アプリ(ネイルオーダー管理)から収入記録が追加/変更されたら自動で反映
function reloadFromStorage() {
  records = loadJson(STORAGE_KEY).map(r => r.client ? r : { ...r, client: r.category || 'その他' });
  clients = loadJson(CLIENTS_KEY);
}

  if (e.key === STORAGE_KEY || e.key === CLIENTS_KEY || e.key === null) {
    reloadFromStorage();
    renderClientOptions();
    renderChips();
    render();
  }
});

  if (!document.hidden) {
    reloadFromStorage();
    renderClientOptions();
    renderChips();
    render();
  }
});

// ===== タブ切り替え(収入 / ネイルオーダー) =====
const _tabIncome = document.getElementById('tab-income');
const _tabOrders = document.getElementById('tab-orders');
const _ordersFrame = document.getElementById('orders-frame');
let _frameLoaded = false;
function _resizeOrdersFrame() {
  try {
    _ordersFrame.style.height = _ordersFrame.contentWindow.document.documentElement.scrollHeight + 'px';
  } catch (e) {}
}
function showTab(name) {
  const orders = name === 'orders';
  _tabIncome.classList.toggle('hidden', orders);
  _tabOrders.classList.toggle('hidden', !orders);
  document.querySelectorAll('.tabs button').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
  try { localStorage.setItem('active-tab', name); } catch (e) {}
  if (orders) {
    if (!_frameLoaded) { _ordersFrame.src = 'orders.html'; _frameLoaded = true; }
    else { _resizeOrdersFrame(); }
  } else {
    // 収入タブに戻ったら、ネイルからの売上を反映して再描画
    reloadFromStorage();
    renderClientOptions();
    renderChips();
    render();
  }
  window.scrollTo(0, 0);
}
_ordersFrame.addEventListener('load', () => {
  _resizeOrdersFrame();
  try {
    new ResizeObserver(() => _resizeOrdersFrame()).observe(_ordersFrame.contentWindow.document.documentElement);
  } catch (e) {}
});
document.querySelectorAll('.tabs button').forEach(b => b.addEventListener('click', () => showTab(b.dataset.tab)));
showTab((() => { try { return localStorage.getItem('active-tab') || 'income'; } catch (e) { return 'income'; } })());

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
